<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { width: 1200px; height: 630px; overflow: hidden; }
  body {
    width: 1200px;
    height: 630px;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Glow blob */
  body::after {
    content: '';
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(52, 152, 219, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* Inline shield icon */
  .logo-icon {
    width: 72px;
    height: 72px;
    filter: drop-shadow(0 0 16px rgba(52,152,219,0.5));
  }

  .logo-text {
    font-size: 64px;
    font-weight: 800;
    color: white;
    letter-spacing: -2px;
    line-height: 1;
  }

  .tagline {
    font-size: 28px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    letter-spacing: 0.2px;
    max-width: 680px;
    line-height: 1.4;
  }

  .pills {
    display: flex;
    gap: 14px;
    margin-top: 4px;
  }

  .pill {
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .pill-red   { background: rgba(231,76,60,0.18);  color: #e74c3c; border: 1.5px solid rgba(231,76,60,0.35); }
  .pill-orange{ background: rgba(230,126,34,0.18); color: #e67e22; border: 1.5px solid rgba(230,126,34,0.35); }
  .pill-green { background: rgba(39,174,96,0.18);  color: #2ecc71; border: 1.5px solid rgba(39,174,96,0.35); }

  .url {
    position: absolute;
    bottom: 36px;
    right: 52px;
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
    letter-spacing: 0.3px;
    z-index: 1;
  }

  .epa-badge {
    position: absolute;
    bottom: 36px;
    left: 52px;
    font-size: 16px;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .epa-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(52,152,219,0.6);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo-wrap">
      <!-- Shield icon inline -->
      <svg class="logo-icon" viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4L6 14v20c0 16 11.2 30.4 26 34.4C46.8 64.4 58 50 58 34V14L32 4z" fill="#3498db" opacity="0.9"/>
        <path d="M32 4L6 14v20c0 16 11.2 30.4 26 34.4C46.8 64.4 58 50 58 34V14L32 4z" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
        <circle cx="32" cy="33" r="8" fill="white" opacity="0.9"/>
        <line x1="32" y1="19" x2="32" y2="24.5" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="32" y1="41.5" x2="32" y2="47" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="18.5" y1="33" x2="24" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
        <line x1="40" y1="33" x2="45.5" y2="33" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      </svg>
      <span class="logo-text">ToxScreen</span>
    </div>

    <div class="tagline">Know what's near you — search EPA toxic chemical<br>release data by ZIP code, city, or address.</div>

    <div class="pills">
      <span class="pill pill-red">High Concern</span>
      <span class="pill pill-orange">Moderate</span>
      <span class="pill pill-green">Low Concern</span>
    </div>
  </div>

  <div class="epa-badge">
    <span class="epa-dot"></span>
    Powered by EPA Toxics Release Inventory data
  </div>
  <div class="url">toxscreen.vercel.app</div>
</body>
</html>
