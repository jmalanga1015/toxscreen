<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { width: 1200px; height: 630px; overflow: hidden; }
  body {
    width: 1200px;
    height: 630px;
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Glow blob */
  body::after {
    content: '';
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(52, 152, 219, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
  }

  .logo-img {
    height: 80px;
    width: auto;
    filter: drop-shadow(0 2px 12px rgba(57,233,145,0.25));
  }

  .tagline {
    font-size: 28px;
    color: rgba(255,255,255,0.65);
    font-weight: 400;
    letter-spacing: 0.2px;
    max-width: 680px;
    line-height: 1.4;
  }

  .pills {
    display: flex;
    gap: 14px;
    margin-top: 4px;
  }

  .pill {
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .pill-red   { background: rgba(231,76,60,0.18);  color: #e74c3c; border: 1.5px solid rgba(231,76,60,0.35); }
  .pill-orange{ background: rgba(230,126,34,0.18); color: #e67e22; border: 1.5px solid rgba(230,126,34,0.35); }
  .pill-green { background: rgba(39,174,96,0.18);  color: #2ecc71; border: 1.5px solid rgba(39,174,96,0.35); }

  .url {
    position: absolute;
    bottom: 36px;
    right: 52px;
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
    letter-spacing: 0.3px;
    z-index: 1;
  }

  .epa-badge {
    position: absolute;
    bottom: 36px;
    left: 52px;
    font-size: 16px;
    color: rgba(255,255,255,0.25);
    font-weight: 400;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .epa-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(52,152,219,0.6);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo-wrap">
      <img src="/logo-white.svg" class="logo-img" alt="ToxScreen" />
    </div>

    <div class="tagline">Know what's near you — search EPA toxic chemical<br>release data by ZIP code, city, or address.</div>

    <div class="pills">
      <span class="pill pill-red">High Concern</span>
      <span class="pill pill-orange">Moderate</span>
      <span class="pill pill-green">Low Concern</span>
    </div>
  </div>

  <div class="epa-badge">
    <span class="epa-dot"></span>
    Powered by EPA Toxics Release Inventory data
  </div>
  <div class="url">toxscreen.vercel.app</div>
</body>
</html>
